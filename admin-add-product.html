<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Add Product - Vedanta Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050508;
            color: #FFFFFF;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(212,175,55,0.1), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(10,10,18,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212,175,55,0.2);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF8E7, #D4AF37, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #D4AF37;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        .form-card {
            background: rgba(15,15,22,0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(212,175,55,0.2);
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #D4AF37;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #CCCCCC;
            font-weight: 500;
        }
        .form-group label .required {
            color: #FF4500;
            margin-left: 3px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #D4AF37;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group .hint {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        .image-upload-area {
            border: 2px dashed rgba(212,175,55,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .image-upload-area:hover {
            border-color: #D4AF37;
            background: rgba(212,175,55,0.05);
        }
        .image-preview {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .preview-img {
            width: 100px;
            height: 100px;
            background: #1A1A1A;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(212,175,55,0.3);
            overflow: hidden;
        }
        .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .preview-img i {
            font-size: 35px;
            color: #D4AF37;
        }
        .remove-img {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #F44336;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
            z-index: 10;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            color: #050508;
            cursor: pointer;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #D4AF37;
            color: #050508;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 10000;
            font-size: 12px;
            display: none;
        }
        .toast.show { display: block; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .form-card { padding: 20px; }
            .row-2, .row-3 { grid-template-columns: 1fr; gap: 0; }
        }
        .sync-badge {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 10px;
        }
        .image-size-warning {
            background: rgba(244,67,54,0.15);
            color: #F44336;
            padding: 8px 12px;
            border-radius: 12px;
            font-size: 11px;
            margin-top: 10px;
            display: none;
        }
        .image-size-warning.show {
            display: block;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><h1>VEDANTA ADMIN <span class="sync-badge"><i class="fas fa-cloud-upload-alt"></i> Add Product</span></h1></div>
    <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>

<div class="container">
    <div class="form-card">
        <div class="section-title"><i class="fas fa-plus-circle"></i> Add New Product to Cloud</div>
        
        <div class="form-group">
            <label>Product Name <span class="required">*</span></label>
            <input type="text" id="productName" placeholder="e.g., Banarasi Silk Saree">
        </div>
        
        <div class="row-2">
            <div class="form-group">
                <label>Category <span class="required">*</span></label>
                <input type="text" id="category" placeholder="e.g., Saree, Kurta, Crystal">
            </div>
            <div class="form-group">
                <label>Offer Badge</label>
                <select id="badge">
                    <option value="Best Seller">🔥 Best Seller</option>
                    <option value="Trending">⭐ Trending</option>
                    <option value="New">✨ New Arrival</option>
                    <option value="Sale">🎉 Sale</option>
                    <option value="Limited">💎 Limited Edition</option>
                </select>
            </div>
        </div>
        
        <div class="row-3">
            <div class="form-group">
                <label>Price (₹) <span class="required">*</span></label>
                <input type="number" id="price" placeholder="Selling price">
            </div>
            <div class="form-group">
                <label>Compare Price (MRP)</label>
                <input type="number" id="comparePrice" placeholder="Original MRP">
            </div>
            <div class="form-group">
                <label>Discount (%)</label>
                <input type="text" id="discount" placeholder="Auto calculated" readonly>
            </div>
        </div>
        
        <div class="row-2">
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" id="stock" value="10">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="active">✅ Active (Visible on website)</option>
                    <option value="inactive">❌ Inactive (Hidden)</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Short Description</label>
            <input type="text" id="shortDesc" placeholder="Brief description (max 150 chars)">
        </div>
        
        <div class="form-group">
            <label>Full Description</label>
            <textarea id="fullDesc" rows="3" placeholder="Detailed product description, features, benefits..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Product Images</label>
            <div class="image-upload-area" id="imageUploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 40px; color: #D4AF37;"></i>
                <p style="margin-top: 10px;">Click to upload images (Max 5 images, each less than 200KB)</p>
                <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
            </div>
            <div class="image-size-warning" id="imageSizeWarning">
                <i class="fas fa-exclamation-triangle"></i> Image too large! Please use images smaller than 200KB.
            </div>
            <div class="image-preview" id="imagePreview"></div>
            <div class="hint"><i class="fas fa-info-circle"></i> Images will be compressed automatically. For best results, use images under 200KB.</div>
        </div>
        
        <div class="form-group">
            <label>Video URL (YouTube)</label>
            <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        
        <button class="submit-btn" id="submitBtn"><i class="fas fa-cloud-upload-alt"></i> Publish to Cloud</button>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ========== 🔥 FIREBASE CONFIGURATION ==========
    const firebaseConfig = {
        apiKey: "AIzaSyCMPUAV50FOsqpyTKY3lioeAgbQvxQzLnM",
        authDomain: "vedanta-d0199.firebaseapp.com",
        projectId: "vedanta-d0199",
        storageBucket: "vedanta-d0199.firebasestorage.app",
        messagingSenderId: "761061711987",
        appId: "1:761061711987:web:d59ff32fd53057c395ca06",
        measurementId: "G-RQMQZVGK75"
    };
    
    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    console.log("🔥 Firebase Connected!");
    
    let images = [];
    
    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = isError ? '#F44336' : '#D4AF37';
        toast.style.color = isError ? 'white' : '#050508';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Calculate discount automatically
    function calculateDiscount() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const comparePrice = parseFloat(document.getElementById('comparePrice').value) || 0;
        const discountInput = document.getElementById('discount');
        if (discountInput) {
            if (comparePrice > price && price > 0) {
                const discount = Math.round(((comparePrice - price) / comparePrice) * 100);
                discountInput.value = discount + '%';
            } else {
                discountInput.value = '0%';
            }
        }
    }
    
    const priceInput = document.getElementById('price');
    const comparePriceInput = document.getElementById('comparePrice');
    if (priceInput) priceInput.addEventListener('input', calculateDiscount);
    if (comparePriceInput) comparePriceInput.addEventListener('input', calculateDiscount);
    
    // 🔥 COMPRESS IMAGE FUNCTION (Reduce size)
    function compressImage(file, maxSizeKB = 150) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    
                    // Reduce dimensions if too large
                    const maxDimension = 800;
                    if (width > maxDimension || height > maxDimension) {
                        if (width > height) {
                            height = (height * maxDimension) / width;
                            width = maxDimension;
                        } else {
                            width = (width * maxDimension) / height;
                            height = maxDimension;
                        }
                    }
                    
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    
                    // Compress to JPEG with 0.7 quality
                    let quality = 0.7;
                    let compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                    
                    // Check size and reduce quality if still too large
                    let sizeInKB = Math.round((compressedDataUrl.length * 3/4) / 1024);
                    while (sizeInKB > maxSizeKB && quality > 0.3) {
                        quality -= 0.1;
                        compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        sizeInKB = Math.round((compressedDataUrl.length * 3/4) / 1024);
                    }
                    
                    console.log(`Image compressed: ${sizeInKB}KB`);
                    resolve(compressedDataUrl);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
    
    // Image upload with compression
    const uploadArea = document.getElementById('imageUploadArea');
    const imageInput = document.getElementById('imageInput');
    const imageSizeWarning = document.getElementById('imageSizeWarning');
    
    uploadArea.addEventListener('click', () => imageInput.click());
    imageInput.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        imageSizeWarning.classList.remove('show');
        
        if (images.length + files.length > 5) {
            showToast('❌ Maximum 5 images allowed', true);
            return;
        }
        
        for (const file of files) {
            try {
                // Check original file size
                const originalSizeKB = file.size / 1024;
                if (originalSizeKB > 500) {
                    imageSizeWarning.classList.add('show');
                    showToast(`⚠️ Image ${file.name} is ${Math.round(originalSizeKB)}KB. Please use smaller images.`, true);
                    continue;
                }
                
                // Compress image
                const compressedImage = await compressImage(file, 150);
                images.push(compressedImage);
                renderImages();
            } catch (error) {
                console.error("Error compressing image:", error);
            }
        }
        imageInput.value = '';
    });
    
    function renderImages() {
        const preview = document.getElementById('imagePreview');
        if (!preview) return;
        if (images.length === 0) {
            preview.innerHTML = '';
            return;
        }
        preview.innerHTML = images.map((img, idx) => `
            <div class="preview-img">
                <img src="${img}" alt="Product image">
                <div class="remove-img" onclick="removeImage(${idx})">✕</div>
            </div>
        `).join('');
    }
    
    function removeImage(idx) {
        images.splice(idx, 1);
        renderImages();
    }
    
    function getIconForCategory(category) {
        const icons = {
            'Saree': 'fa-female', 'Kurta': 'fa-male', 'TShirt': 'fa-tshirt',
            'Crystal': 'fa-gem', 'Mala': 'fa-hands-praying', 'Home Decor': 'fa-home',
            'Meditation': 'fa-om', 'Books': 'fa-book', 'Incense': 'fa-fire',
            'Jewelry': 'fa-ring', 'Perfume': 'fa-spray-can', 'Ayurveda': 'fa-leaf',
            'Jeans': 'fa-shopping-bag', 'Western': 'fa-female', 'Traditional': 'fa-male'
        };
        return icons[category] || 'fa-gem';
    }
    
    // Add product to Firebase
    async function addProductToFirebase() {
        const name = document.getElementById('productName')?.value.trim() || '';
        const category = document.getElementById('category')?.value.trim() || '';
        const price = parseFloat(document.getElementById('price')?.value) || 0;
        
        if (!name) { showToast('❌ Please enter product name', true); return false; }
        if (!category) { showToast('❌ Please enter category', true); return false; }
        if (!price) { showToast('❌ Please enter price', true); return false; }
        
        const productId = Date.now().toString();
        
        // Calculate total images size
        let totalSize = 0;
        images.forEach(img => {
            totalSize += (img.length * 3/4) / 1024;
        });
        
        if (totalSize > 900) {
            showToast('❌ Images total size too large. Please use smaller images.', true);
            return false;
        }
        
        const productData = {
            id: productId,
            name: name,
            category: category,
            price: price,
            comparePrice: parseFloat(document.getElementById('comparePrice')?.value) || 0,
            stock: parseInt(document.getElementById('stock')?.value) || 0,
            shortDesc: document.getElementById('shortDesc')?.value || '',
            fullDesc: document.getElementById('fullDesc')?.value || '',
            badge: document.getElementById('badge')?.value || 'New',
            status: document.getElementById('status')?.value || 'active',
            images: images,
            videoUrl: document.getElementById('videoUrl')?.value || '',
            icon: getIconForCategory(category),
            featured: 'no',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        
        try {
            await db.collection('products').doc(productId).set(productData);
            console.log("✅ Product saved to Firebase!");
            return { success: true, productId: productId };
        } catch (error) {
            console.error("Firebase Error:", error);
            if (error.message && error.message.includes('longer than')) {
                showToast('❌ Images too large! Please use smaller images (under 150KB each)', true);
            } else {
                showToast(`❌ Failed to publish: ${error.message}`, true);
            }
            return { success: false, error: error.message };
        }
    }
    
    async function saveProduct() {
        const name = document.getElementById('productName')?.value.trim() || '';
        const category = document.getElementById('category')?.value.trim() || '';
        const price = parseFloat(document.getElementById('price')?.value) || 0;
        
        if (!name) { showToast('❌ Please enter product name', true); return; }
        if (!category) { showToast('❌ Please enter category', true); return; }
        if (!price) { showToast('❌ Please enter product price', true); return; }
        
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Publishing to Cloud...';
        
        const result = await addProductToFirebase();
        
        if (result.success) {
            showToast('✅ Product published to cloud! Available on all devices!');
            
            // Reset form
            if (document.getElementById('productName')) document.getElementById('productName').value = '';
            if (document.getElementById('category')) document.getElementById('category').value = '';
            if (document.getElementById('price')) document.getElementById('price').value = '';
            if (document.getElementById('comparePrice')) document.getElementById('comparePrice').value = '';
            if (document.getElementById('shortDesc')) document.getElementById('shortDesc').value = '';
            if (document.getElementById('fullDesc')) document.getElementById('fullDesc').value = '';
            if (document.getElementById('videoUrl')) document.getElementById('videoUrl').value = '';
            if (document.getElementById('stock')) document.getElementById('stock').value = '10';
            images = [];
            renderImages();
            calculateDiscount();
            
            setTimeout(() => {
                window.location.href = 'admin.html';
            }, 1500);
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Publish to Cloud';
        }
    }
    
    const submitBtn = document.getElementById('submitBtn');
    if (submitBtn) submitBtn.addEventListener('click', saveProduct);
    
    // Make functions global
    window.removeImage = removeImage;
    
    // Calculate initial discount
    calculateDiscount();
</script>
</body>
</html>
