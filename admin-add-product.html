<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>Add Product - Vedanta Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Space Grotesk', sans-serif;
            background: #050508;
            color: #FFFFFF;
            overflow-x: hidden;
            min-height: 100vh;
        }
        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 20% 40%, rgba(212,175,55,0.1), transparent 70%);
            pointer-events: none;
            z-index: -1;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 20px;
            background: rgba(10,10,18,0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(212,175,55,0.2);
            flex-wrap: wrap;
            gap: 15px;
        }
        .logo h1 {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, #FFF8E7, #D4AF37, #FF8C00);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        .back-btn {
            background: rgba(212,175,55,0.15);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 8px 20px;
            border-radius: 40px;
            color: #D4AF37;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
            padding: 24px 20px;
        }
        .form-card {
            background: rgba(15,15,22,0.6);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 28px;
            border: 1px solid rgba(212,175,55,0.2);
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 20px;
            font-weight: 700;
            margin-bottom: 24px;
            color: #D4AF37;
            display: flex;
            align-items: center;
            gap: 10px;
            padding-bottom: 12px;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }
        .form-group {
            margin-bottom: 20px;
        }
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            color: #CCCCCC;
            font-weight: 500;
        }
        .form-group label .required {
            color: #FF4500;
            margin-left: 3px;
        }
        .form-group input, .form-group select, .form-group textarea {
            width: 100%;
            padding: 14px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 16px;
            color: white;
            font-size: 14px;
            font-family: inherit;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none;
            border-color: #D4AF37;
        }
        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }
        .form-group .hint {
            font-size: 11px;
            color: #888;
            margin-top: 5px;
        }
        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        .row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }
        /* Size & Color Chips */
        .chips-container {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 8px;
        }
        .chip {
            background: rgba(0,0,0,0.4);
            border: 1px solid rgba(212,175,55,0.3);
            padding: 8px 16px;
            border-radius: 40px;
            font-size: 13px;
            cursor: pointer;
            transition: 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .chip:hover {
            border-color: #D4AF37;
            background: rgba(212,175,55,0.1);
        }
        .chip.selected {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            color: #050508;
            border-color: transparent;
        }
        .color-chip {
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }
        .color-dot {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: inline-block;
            border: 1px solid rgba(255,255,255,0.2);
        }
        /* Color Modal */
        .color-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            z-index: 10001;
            justify-content: center;
            align-items: center;
        }
        .color-modal.show {
            display: flex;
        }
        .color-modal-content {
            background: #0a0a12;
            border-radius: 28px;
            width: 90%;
            max-width: 700px;
            max-height: 80vh;
            overflow: hidden;
            border: 1px solid rgba(212,175,55,0.3);
        }
        .color-modal-header {
            padding: 16px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .color-modal-header h3 {
            color: #D4AF37;
        }
        .color-search {
            padding: 12px 20px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .color-search input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.5);
            border: 1px solid rgba(212,175,55,0.3);
            border-radius: 40px;
            color: white;
        }
        .color-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(100px, 1fr));
            gap: 8px;
            padding: 20px;
            max-height: 50vh;
            overflow-y: auto;
        }
        .color-option {
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 40px;
            padding: 8px 12px;
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: 0.2s;
            font-size: 12px;
        }
        .color-option:hover {
            border-color: #D4AF37;
            background: rgba(212,175,55,0.1);
        }
        .color-option.selected {
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            color: #050508;
        }
        .color-option .color-dot {
            width: 16px;
            height: 16px;
        }
        .view-all-btn {
            background: rgba(212,175,55,0.15);
            border: 1px solid #D4AF37;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 11px;
            cursor: pointer;
            margin-left: 10px;
        }
        .selected-count {
            background: #D4AF37;
            color: #050508;
            padding: 2px 8px;
            border-radius: 40px;
            font-size: 11px;
            margin-left: 10px;
        }
        .combo-card {
            background: rgba(76,175,80,0.1);
            border: 1px solid rgba(76,175,80,0.3);
            border-radius: 16px;
            padding: 15px;
            margin-top: 10px;
        }
        .combo-row {
            display: grid;
            grid-template-columns: 1fr auto 1fr auto;
            gap: 10px;
            align-items: center;
            margin-bottom: 10px;
        }
        .combo-row input {
            padding: 10px;
        }
        .add-combo-btn {
            background: rgba(212,175,55,0.2);
            border: 1px solid #D4AF37;
            padding: 8px 16px;
            border-radius: 40px;
            color: #D4AF37;
            cursor: pointer;
            margin-top: 10px;
        }
        .combo-list {
            margin-top: 12px;
        }
        .combo-item {
            background: rgba(0,0,0,0.3);
            padding: 8px 12px;
            border-radius: 12px;
            margin-bottom: 6px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .remove-combo {
            color: #F44336;
            cursor: pointer;
        }
        .image-upload-area {
            border: 2px dashed rgba(212,175,55,0.3);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            margin-bottom: 15px;
        }
        .image-upload-area:hover {
            border-color: #D4AF37;
            background: rgba(212,175,55,0.05);
        }
        .image-preview {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 15px;
        }
        .preview-img {
            width: 100px;
            height: 100px;
            background: #1A1A1A;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            border: 1px solid rgba(212,175,55,0.3);
            overflow: hidden;
        }
        .preview-img img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .remove-img {
            position: absolute;
            top: -8px;
            right: -8px;
            background: #F44336;
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            cursor: pointer;
        }
        .submit-btn {
            width: 100%;
            background: linear-gradient(135deg, #D4AF37, #FF8C00);
            border: none;
            padding: 16px;
            border-radius: 50px;
            font-weight: 800;
            font-size: 16px;
            color: #050508;
            cursor: pointer;
            margin-top: 10px;
        }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #D4AF37;
            color: #050508;
            padding: 10px 20px;
            border-radius: 50px;
            font-weight: bold;
            z-index: 10000;
            font-size: 12px;
            display: none;
        }
        .toast.show { display: block; animation: fadeInOut 2s ease; }
        @keyframes fadeInOut {
            0% { opacity: 0; transform: translateX(-50%) translateY(10px); }
            15% { opacity: 1; transform: translateX(-50%) translateY(0); }
            100% { opacity: 0; transform: translateX(-50%) translateY(-10px); }
        }
        @media (max-width: 600px) {
            .container { padding: 16px; }
            .form-card { padding: 20px; }
            .row-2, .row-3 { grid-template-columns: 1fr; gap: 0; }
            .combo-row { grid-template-columns: 1fr; }
            .color-grid { grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); }
        }
        .sync-badge {
            background: rgba(76,175,80,0.2);
            color: #4CAF50;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 10px;
            margin-left: 10px;
        }
        .close-modal {
            background: none;
            border: none;
            color: white;
            font-size: 24px;
            cursor: pointer;
        }
    </style>
</head>
<body>

<div class="header">
    <div class="logo"><h1>VEDANTA ADMIN <span class="sync-badge"><i class="fas fa-cloud-upload-alt"></i> Add Product</span></h1></div>
    <a href="admin.html" class="back-btn"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
</div>

<div class="container">
    <div class="form-card">
        <div class="section-title"><i class="fas fa-plus-circle"></i> Add New Product to Cloud</div>
        
        <div class="form-group">
            <label>Product Name <span class="required">*</span></label>
            <input type="text" id="productName" placeholder="e.g., Premium Cotton T-Shirt">
        </div>
        
        <div class="row-2">
            <div class="form-group">
                <label>Category <span class="required">*</span></label>
                <select id="category">
                    <option value="T-Shirt">👕 T-Shirt</option>
                    <option value="Shirt">👔 Shirt</option>
                    <option value="Kurta">🧥 Kurta</option>
                    <option value="Saree">🥻 Saree</option>
                    <option value="Jeans">👖 Jeans</option>
                    <option value="Jacket">🧥 Jacket</option>
                    <option value="Dress">👗 Dress</option>
                    <option value="Crystal">💎 Crystal</option>
                    <option value="Mala">📿 Mala</option>
                    <option value="Home Decor">🏠 Home Decor</option>
                </select>
            </div>
            <div class="form-group">
                <label>Offer Badge</label>
                <select id="badge">
                    <option value="Best Seller">🔥 Best Seller</option>
                    <option value="Trending">⭐ Trending</option>
                    <option value="New">✨ New Arrival</option>
                    <option value="Sale">🎉 Sale</option>
                    <option value="Limited">💎 Limited Edition</option>
                </select>
            </div>
        </div>
        
        <!-- SIZES -->
        <div class="form-group">
            <label>Sizes Available (Optional - for clothing)</label>
            <div class="chips-container" id="sizeContainer">
                <div class="chip" data-size="XS">XS</div>
                <div class="chip" data-size="S">S</div>
                <div class="chip" data-size="M">M</div>
                <div class="chip" data-size="L">L</div>
                <div class="chip" data-size="XL">XL</div>
                <div class="chip" data-size="XXL">XXL</div>
                <div class="chip" data-size="3XL">3XL</div>
                <div class="chip" data-size="4XL">4XL</div>
                <div class="chip" data-size="Free Size">Free Size</div>
            </div>
        </div>
        
        <!-- COLORS with View All Button - 200+ Colors -->
        <div class="form-group">
            <label style="display: flex; align-items: center; flex-wrap: wrap; gap: 10px;">
                Colors Available 
                <span class="selected-count" id="selectedColorCount">0 selected</span>
                <button type="button" class="view-all-btn" id="viewAllColorsBtn"><i class="fas fa-th"></i> View All Colors (200+)</button>
            </label>
            <div class="chips-container" id="colorContainer">
                <!-- 12 popular colors with color dots will be shown here -->
            </div>
            <div class="hint"><i class="fas fa-palette"></i> Click on colors to select. Click "View All Colors" for 200+ colors!</div>
        </div>
        
        <div class="row-3">
            <div class="form-group">
                <label>Price (₹) <span class="required">*</span></label>
                <input type="number" id="price" placeholder="Selling price">
            </div>
            <div class="form-group">
                <label>Compare Price (MRP)</label>
                <input type="number" id="comparePrice" placeholder="Original MRP">
            </div>
            <div class="form-group">
                <label>Discount (%)</label>
                <input type="text" id="discount" placeholder="Auto calculated" readonly>
            </div>
        </div>
        
        <!-- COMBO OFFERS -->
        <div class="form-group">
            <label>Combo / Special Offers</label>
            <div class="combo-card">
                <div class="combo-row">
                    <input type="text" id="comboQuantity" placeholder="Qty (e.g., 2)" style="width: 80px;">
                    <span>for</span>
                    <input type="number" id="comboPrice" placeholder="Price (e.g., 900)" style="width: 100px;">
                    <button class="add-combo-btn" id="addComboBtn">+ Add Offer</button>
                </div>
                <div class="combo-list" id="comboList"></div>
            </div>
        </div>
        
        <!-- QUANTITY DISCOUNT -->
        <div class="form-group">
            <label>Bulk Quantity Discount (Optional)</label>
            <div class="row-2">
                <input type="number" id="qty2" placeholder="Min Qty (e.g., 2)">
                <input type="number" id="price2" placeholder="Price per piece (e.g., 450)">
            </div>
            <div class="row-2" style="margin-top: 8px;">
                <input type="number" id="qty3" placeholder="Min Qty (e.g., 3)">
                <input type="number" id="price3" placeholder="Price per piece (e.g., 430)">
            </div>
            <div class="row-2" style="margin-top: 8px;">
                <input type="number" id="qty5" placeholder="Min Qty (e.g., 5)">
                <input type="number" id="price5" placeholder="Price per piece (e.g., 400)">
            </div>
        </div>
        
        <div class="row-2">
            <div class="form-group">
                <label>Stock Quantity</label>
                <input type="number" id="stock" value="10">
            </div>
            <div class="form-group">
                <label>Status</label>
                <select id="status">
                    <option value="active">✅ Active (Visible on website)</option>
                    <option value="inactive">❌ Inactive (Hidden)</option>
                </select>
            </div>
        </div>
        
        <div class="form-group">
            <label>Short Description</label>
            <input type="text" id="shortDesc" placeholder="Brief description (max 150 chars)">
        </div>
        
        <div class="form-group">
            <label>Full Description</label>
            <textarea id="fullDesc" rows="3" placeholder="Detailed product description..."></textarea>
        </div>
        
        <div class="form-group">
            <label>Product Images</label>
            <div class="image-upload-area" id="imageUploadArea">
                <i class="fas fa-cloud-upload-alt" style="font-size: 40px; color: #D4AF37;"></i>
                <p>Click to upload images (Max 5 images)</p>
                <input type="file" id="imageInput" multiple accept="image/*" style="display: none;">
            </div>
            <div class="image-preview" id="imagePreview"></div>
        </div>
        
        <div class="form-group">
            <label>Video URL (YouTube)</label>
            <input type="url" id="videoUrl" placeholder="https://www.youtube.com/watch?v=...">
        </div>
        
        <button class="submit-btn" id="submitBtn"><i class="fas fa-cloud-upload-alt"></i> Publish to Cloud</button>
    </div>
</div>

<!-- COLOR MODAL - 200+ Colors -->
<div class="color-modal" id="colorModal">
    <div class="color-modal-content">
        <div class="color-modal-header">
            <h3><i class="fas fa-palette"></i> Select Colors (200+ colors)</h3>
            <button class="close-modal" id="closeModalBtn">&times;</button>
        </div>
        <div class="color-search">
            <input type="text" id="colorSearchInput" placeholder="Search color... (e.g., Red, Blue, Green)">
        </div>
        <div class="color-grid" id="fullColorGrid">
            <!-- All colors will be loaded here -->
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

    function showToast(msg, isError = false) {
        const toast = document.getElementById('toast');
        toast.innerText = msg;
        toast.style.background = isError ? '#F44336' : '#D4AF37';
        toast.style.color = isError ? 'white' : '#050508';
        toast.classList.add('show');
        setTimeout(() => toast.classList.remove('show'), 3000);
    }
    
    // Render Popular Colors with color dots
    function renderPopularColors() {
        const container = document.getElementById('colorContainer');
        if (!container) return;
        
        container.innerHTML = popularColors.map(color => `
            <div class="chip color-chip ${selectedColors.includes(color.name) ? 'selected' : ''}" 
                 data-color="${color.name}" data-code="${color.code}">
                <span class="color-dot" style="background: ${color.code};"></span>
                ${color.name}
            </div>
        `).join('');
        
        document.querySelectorAll('#colorContainer .chip').forEach(chip => {
            chip.addEventListener('click', () => {
                const colorName = chip.getAttribute('data-color');
                if (selectedColors.includes(colorName)) {
                    selectedColors = selectedColors.filter(c => c !== colorName);
                    chip.classList.remove('selected');
                } else {
                    selectedColors.push(colorName);
                    chip.classList.add('selected');
                }
                updateSelectedColorCount();
            });
        });
    }
    
    // Render Full Color Grid with color dots (200+ colors)
    function renderFullColorGrid(searchTerm = '') {
        const container = document.getElementById('fullColorGrid');
        if (!container) return;
        
        let filteredColors = allColors;
        if (searchTerm) {
            filteredColors = allColors.filter(color => 
                color.name.toLowerCase().includes(searchTerm.toLowerCase())
            );
        }
        
        container.innerHTML = filteredColors.map(color => `
            <div class="color-option ${selectedColors.includes(color.name) ? 'selected' : ''}" 
                 data-color="${color.name}" data-code="${color.code}">
                <span class="color-dot" style="background: ${color.code};"></span>
                ${color.name}
            </div>
        `).join('');
        
        document.querySelectorAll('#fullColorGrid .color-option').forEach(option => {
            option.addEventListener('click', () => {
                const colorName = option.getAttribute('data-color');
                if (selectedColors.includes(colorName)) {
                    selectedColors = selectedColors.filter(c => c !== colorName);
                    option.classList.remove('selected');
                } else {
                    selectedColors.push(colorName);
                    option.classList.add('selected');
                }
                updateSelectedColorCount();
                renderPopularColors(); // Refresh popular colors to show selection
            });
        });
    }
    
    function updateSelectedColorCount() {
        const countSpan = document.getElementById('selectedColorCount');
        if (countSpan) {
            countSpan.textContent = `${selectedColors.length} selected`;
        }
    }
    
    // Size selection
    document.querySelectorAll('#sizeContainer .chip').forEach(chip => {
        chip.addEventListener('click', () => {
            const size = chip.getAttribute('data-size');
            if (selectedSizes.includes(size)) {
                selectedSizes = selectedSizes.filter(s => s !== size);
                chip.classList.remove('selected');
            } else {
                selectedSizes.push(size);
                chip.classList.add('selected');
            }
        });
    });
    
    // Combo offers
    function renderCombos() {
        const container = document.getElementById('comboList');
        if (!container) return;
        
        if (combos.length === 0) {
            container.innerHTML = '<div class="hint">No offers added yet</div>';
            return;
        }
        container.innerHTML = combos.map((combo, idx) => `
            <div class="combo-item">
                <span>${combo.quantity} for ₹${combo.price}</span>
                <span class="remove-combo" onclick="removeCombo(${idx})">✕ Remove</span>
            </div>
        `).join('');
    }
    
    window.removeCombo = function(idx) {
        combos.splice(idx, 1);
        renderCombos();
    };
    
    document.getElementById('addComboBtn')?.addEventListener('click', () => {
        const quantity = document.getElementById('comboQuantity')?.value.trim();
        const price = document.getElementById('comboPrice')?.value.trim();
        if (!quantity || !price) {
            showToast('Please enter both quantity and price', true);
            return;
        }
        combos.push({ quantity: quantity, price: parseInt(price) });
        renderCombos();
        document.getElementById('comboQuantity').value = '';
        document.getElementById('comboPrice').value = '';
    });
    
    // Discount calculation
    function calculateDiscount() {
        const price = parseFloat(document.getElementById('price').value) || 0;
        const comparePrice = parseFloat(document.getElementById('comparePrice').value) || 0;
        const discountInput = document.getElementById('discount');
        if (comparePrice > price && price > 0) {
            const discount = Math.round(((comparePrice - price) / comparePrice) * 100);
            discountInput.value = discount + '%';
        } else {
            discountInput.value = '0%';
        }
    }
    
    document.getElementById('price')?.addEventListener('input', calculateDiscount);
    document.getElementById('comparePrice')?.addEventListener('input', calculateDiscount);
    
    // Image compression
    function compressImage(file, maxSizeKB = 150) {
        return new Promise((resolve, reject) => {
            const reader = new FileReader();
            reader.readAsDataURL(file);
            reader.onload = (event) => {
                const img = new Image();
                img.src = event.target.result;
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width;
                    let height = img.height;
                    const maxDimension = 800;
                    if (width > maxDimension || height > maxDimension) {
                        if (width > height) {
                            height = (height * maxDimension) / width;
                            width = maxDimension;
                        } else {
                            width = (width * maxDimension) / height;
                            height = maxDimension;
                        }
                    }
                    canvas.width = width;
                    canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    let quality = 0.7;
                    let compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                    let sizeInKB = Math.round((compressedDataUrl.length * 3/4) / 1024);
                    while (sizeInKB > maxSizeKB && quality > 0.3) {
                        quality -= 0.1;
                        compressedDataUrl = canvas.toDataURL('image/jpeg', quality);
                        sizeInKB = Math.round((compressedDataUrl.length * 3/4) / 1024);
                    }
                    resolve(compressedDataUrl);
                };
                img.onerror = reject;
            };
            reader.onerror = reject;
        });
    }
    
    const uploadArea = document.getElementById('imageUploadArea');
    const imageInput = document.getElementById('imageInput');
    
    uploadArea?.addEventListener('click', () => imageInput.click());
    imageInput?.addEventListener('change', async (e) => {
        const files = Array.from(e.target.files);
        if (images.length + files.length > 5) {
            showToast('Maximum 5 images allowed', true);
            return;
        }
        for (const file of files) {
            try {
                const compressedImage = await compressImage(file, 150);
                images.push(compressedImage);
                renderImages();
            } catch (error) {
                console.error("Error compressing image:", error);
            }
        }
        imageInput.value = '';
    });
    
    function renderImages() {
        const preview = document.getElementById('imagePreview');
        if (!preview) return;
        
        if (images.length === 0) {
            preview.innerHTML = '';
            return;
        }
        preview.innerHTML = images.map((img, idx) => `
            <div class="preview-img">
                <img src="${img}" alt="Product image">
                <div class="remove-img" onclick="removeImage(${idx})">✕</div>
            </div>
        `).join('');
    }
    
    window.removeImage = function(idx) {
        images.splice(idx, 1);
        renderImages();
    };
    
    function getBulkDiscounts() {
        const discounts = {};
        const qty2 = document.getElementById('qty2')?.value;
        const price2 = document.getElementById('price2')?.value;
        if (qty2 && price2) discounts[qty2] = parseInt(price2);
        
        const qty3 = document.getElementById('qty3')?.value;
        const price3 = document.getElementById('price3')?.value;
        if (qty3 && price3) discounts[qty3] = parseInt(price3);
        
        const qty5 = document.getElementById('qty5')?.value;
        const price5 = document.getElementById('price5')?.value;
        if (qty5 && price5) discounts[qty5] = parseInt(price5);
        
        return discounts;
    }
    
    // Save to Firebase
    async function addProductToFirebase() {
        const name = document.getElementById('productName')?.value.trim();
        const category = document.getElementById('category')?.value;
        const price = parseFloat(document.getElementById('price')?.value) || 0;
        
        if (!name) { showToast('Please enter product name', true); return false; }
        if (!price) { showToast('Please enter product price', true); return false; }
        
        const productId = Date.now().toString();
        
        const productData = {
            id: productId,
            name: name,
            category: category,
            price: price,
            comparePrice: parseFloat(document.getElementById('comparePrice')?.value) || 0,
            sizes: selectedSizes,
            colors: selectedColors,
            combos: combos,
            bulkDiscounts: getBulkDiscounts(),
            stock: parseInt(document.getElementById('stock')?.value) || 0,
            shortDesc: document.getElementById('shortDesc')?.value || '',
            fullDesc: document.getElementById('fullDesc')?.value || '',
            badge: document.getElementById('badge')?.value || 'New',
            status: document.getElementById('status')?.value || 'active',
            images: images,
            videoUrl: document.getElementById('videoUrl')?.value || '',
            createdAt: new Date().toISOString(),
            updatedAt: new Date().toISOString()
        };
        
        try {
            await db.collection('products').doc(productId).set(productData);
            return { success: true, productId: productId };
        } catch (error) {
            showToast(`Failed: ${error.message}`, true);
            return { success: false };
        }
    }
    
    async function saveProduct() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> Publishing...';
        
        const result = await addProductToFirebase();
        
        if (result.success) {
            showToast('✅ Product published successfully!');
            setTimeout(() => {
                window.location.href = 'index.html';
            }, 1500);
        } else {
            btn.disabled = false;
            btn.innerHTML = '<i class="fas fa-cloud-upload-alt"></i> Publish to Cloud';
        }
    }

        modal.classList.remove('show');

    modal?.addEventListener('click', (e) => {

            modal.classList.remove('show');
        }
    });
    
    colorSearchInput?.addEventListener('input', (e) => {
        renderFullColorGrid(e.target.value);
    });
    
    document.getElementById('submitBtn')?.addEventListener('click', saveProduct);
    
    // Initialize
    renderPopularColors();
    calculateDiscount();
    updateSelectedColorCount();
