        }

        .login-card p { text-align: center; color: #888; font-size: 13px; margin-bottom: 30px; }
        .input-group { margin-bottom: 20px; }

<body>
    <div id="app"></div>
    <div class="toast" id="toast"></div>

    <script>
        const ADMIN_USERNAME = "vedanta";
        const ADMIN_PASSWORD = "king@63061";

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        let isLoggedIn = localStorage.getItem('adminLoggedIn') === 'true';
        
        let products = [];
        let orders = [];
        
        // Filter states
        let currentDateFilter = 'all';
        let currentStatusFilter = 'all';
        let customStartDate = '';
        let customEndDate = '';

        function loadData() {
            try {
                const savedProducts = localStorage.getItem('vedantaProducts');
                if (savedProducts && savedProducts !== 'undefined' && savedProducts !== 'null') {
                    const parsed = JSON.parse(savedProducts);
                    if (Array.isArray(parsed)) {
                        products = parsed;
                    }
                }
                const savedOrders = localStorage.getItem('vedantaOrders');
                if (savedOrders && savedOrders !== 'undefined' && savedOrders !== 'null') {
                    const parsed = JSON.parse(savedOrders);
                    if (Array.isArray(parsed)) {
                        orders = parsed;
                    }
                }
            } catch(e) { console.log("Error loading data"); }
            
            if (!products || products.length === 0) {
                // Demo products for better visualization
                products = [];
                localStorage.setItem('vedantaProducts', JSON.stringify(products));
            }
            // Add sample orders if none for testing date filter
            if (!orders || orders.length === 0) {
                const today = new Date();
                const yesterday = new Date(today);
                yesterday.setDate(today.getDate() - 1);
                const twoDaysAgo = new Date(today);
                twoDaysAgo.setDate(today.getDate() - 2);
                
                const formatDate = (date) => {
                    const day = date.getDate();
                    const month = date.getMonth() + 1;
                    const year = date.getFullYear();
                    return `${day}/${month}/${year}, ${date.toLocaleTimeString()}`;
                };
                
                orders = [
                    { orderId: "ORD1001", date: formatDate(today), status: "delivered", total: 1299, customer: { fullName: "Rahul Sharma", phone: "9876543210", address: "Delhi" }, items: [{ id: 1, name: "Kurta Set", price: 1299, quantity: 1, size: "M" }], subtotal: 1299, paymentMethod: "COD" },
                    { orderId: "ORD1002", date: formatDate(yesterday), status: "confirmed", total: 2499, customer: { fullName: "Priya Singh", phone: "9988776655", address: "Mumbai" }, items: [{ id: 2, name: "Saree", price: 2499, quantity: 1, size: "L" }], subtotal: 2499, paymentMethod: "Online" },
                    { orderId: "ORD1003", date: formatDate(twoDaysAgo), status: "shipped", total: 899, customer: { fullName: "Amit Verma", phone: "9876541230", address: "Bangalore" }, items: [{ id: 3, name: "Men's Jacket", price: 899, quantity: 1, size: "XL" }], subtotal: 899, paymentMethod: "COD" }
                ];
                saveOrders();
            }
        }

        function saveProducts() {
            localStorage.setItem('vedantaProducts', JSON.stringify(products));
        }

        function saveOrders() {
            localStorage.setItem('vedantaOrders', JSON.stringify(orders));
        }

        // FIXED: Robust date parsing and comparison for exact date match (dd/mm/yyyy)
        function parseDisplayDateToComparable(dateStr) {
            if (!dateStr) return null;
            // Order date format stored as "DD/MM/YYYY, HH:MM:SS" or "DD/MM/YYYY"
            let datePart = dateStr.split(',')[0].trim();
            // Support DD/MM/YYYY or DD-MM-YYYY
            let parts = datePart.includes('/') ? datePart.split('/') : datePart.split('-');
            if (parts.length === 3) {
                const day = parseInt(parts[0], 10);
                const month = parseInt(parts[1], 10) - 1;
                const year = parseInt(parts[2], 10);
                return new Date(year, month, day);
            }
            return null;
        }

        function isSameDate(date1, date2) {
            if (!date1 || !date2) return false;
            return date1.getFullYear() === date2.getFullYear() &&
                   date1.getMonth() === date2.getMonth() &&
                   date1.getDate() === date2.getDate();
        }

        function isToday(orderDateStr) {
            const orderDate = parseDisplayDateToComparable(orderDateStr);
            if (!orderDate) return false;
            const today = new Date();
            const todayDate = new Date(today.getFullYear(), today.getMonth(), today.getDate());
            return isSameDate(orderDate, todayDate);
        }

        function isThisWeek(orderDateStr) {
            const orderDate = parseDisplayDateToComparable(orderDateStr);
            if (!orderDate) return false;
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            startOfWeek.setHours(0,0,0,0);
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            endOfWeek.setHours(23,59,59,999);
            return orderDate >= startOfWeek && orderDate <= endOfWeek;
        }

        function isThisMonth(orderDateStr) {
            const orderDate = parseDisplayDateToComparable(orderDateStr);
            if (!orderDate) return false;
            const today = new Date();
            return orderDate.getMonth() === today.getMonth() && orderDate.getFullYear() === today.getFullYear();
        }

        // FIXED: Custom range filtering - exact date match for start and inclusive end
        function isWithinCustomRange(orderDateStr) {
            if (!customStartDate) return true;
            const orderDate = parseDisplayDateToComparable(orderDateStr);
            if (!orderDate) return false;
            
            // customStartDate format: "DD/MM/YYYY"
            const startParts = customStartDate.split('/');
            const startDateObj = new Date(parseInt(startParts[2], 10), parseInt(startParts[1], 10) - 1, parseInt(startParts[0], 10));
            
            if (customEndDate) {
                const endParts = customEndDate.split('/');
                const endDateObj = new Date(parseInt(endParts[2], 10), parseInt(endParts[1], 10) - 1, parseInt(endParts[0], 10));
                endDateObj.setHours(23,59,59,999);
                return orderDate >= startDateObj && orderDate <= endDateObj;
            } else {
                // If only start date selected: show orders exactly on that day
                return isSameDate(orderDate, startDateObj);
            }
        }

        function filterOrders() {
            let filtered = [...orders];
            
            if (currentStatusFilter !== 'all') {
                filtered = filtered.filter(o => o.status === currentStatusFilter);
            }
            
            if (currentDateFilter === 'today') {
                filtered = filtered.filter(o => isToday(o.date));
            } else if (currentDateFilter === 'week') {
                filtered = filtered.filter(o => isThisWeek(o.date));
            } else if (currentDateFilter === 'month') {
                filtered = filtered.filter(o => isThisMonth(o.date));
            } else if (currentDateFilter === 'custom' && customStartDate) {
                filtered = filtered.filter(o => isWithinCustomRange(o.date));
            }
            
            filtered.sort((a, b) => {
                const dateA = parseDisplayDateToComparable(a.date);
                const dateB = parseDisplayDateToComparable(b.date);
                if (!dateA || !dateB) return 0;
                return dateB - dateA;
            });
            return filtered;
        }

        function getStatusBadgeClass(status) {
            switch(status) {
                case 'confirmed': return 'status-confirmed';
                case 'processing': return 'status-processing';
                case 'shipped': return 'status-shipped';
                case 'delivered': return 'status-delivered';
                case 'cancelled': return 'status-cancelled';
                default: return 'status-confirmed';
            }
        }

        function calculateTotalRevenue() {
            const activeOrders = orders.filter(o => o.status !== 'cancelled');
            return activeOrders.reduce((sum, o) => sum + (o.total || 0), 0);
        }

        function calculateTotalOrders() {
            return orders.filter(o => o.status !== 'cancelled').length;
        }

        function updateStats() {
            const totalProductsEl = document.getElementById('totalProducts');
            const totalOrdersEl = document.getElementById('totalOrders');
            const totalRevenueEl = document.getElementById('totalRevenue');
            const totalCustomersEl = document.getElementById('totalCustomers');
            
            if (totalProductsEl) totalProductsEl.innerText = products.length;
            if (totalOrdersEl) totalOrdersEl.innerText = calculateTotalOrders();
            if (totalRevenueEl) {
                const totalRevenue = calculateTotalRevenue();
                totalRevenueEl.innerText = '₹' + totalRevenue.toLocaleString('en-IN');
            }
            if (totalCustomersEl) {
                const uniqueCustomers = new Set(orders.filter(o => o.status !== 'cancelled').map(o => o.customer?.phone)).size;
                totalCustomersEl.innerText = uniqueCustomers;
            }
        }

        function renderProducts() {
            const container = document.getElementById('productsList');
            if (!container) return;
            if (products.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:40px;">📦 No products found. Click "Add New Product" to add.</div>';
                return;
            }
            container.innerHTML = products.map(p => `
                <div class="product-item">
                    <div class="product-img-preview">
                        ${p.images && p.images.length > 0 ? 
                            `<img src="${p.images[0]}" alt="${escapeHtml(p.name)}">` : 
                            `<i class="fas ${p.icon || 'fa-gem'}"></i>`
                        }
                    </div>
                    <h4>${escapeHtml(p.name)}</h4>
                    <div class="product-price">₹${(p.price || 0).toLocaleString('en-IN')}</div>
                    <div class="product-category">${p.category || 'General'} • ${p.badge || 'New'}</div>
                    ${p.videoUrl ? `<div style="font-size: 10px; color: #888;"><i class="fas fa-video"></i> Video included</div>` : ''}
                    <div class="product-actions">
                        <button class="edit-btn" onclick="editProduct(${p.id})"><i class="fas fa-edit"></i> Edit</button>
                        <button class="delete-btn" onclick="deleteProduct(${p.id})"><i class="fas fa-trash"></i> Delete</button>
                    </div>
                </div>
            `).join('');
            updateStats();
        }

        function deleteOrder(orderId) {
            if (confirm('⚠️ Are you sure you want to DELETE this order permanently? This action cannot be undone!')) {
                orders = orders.filter(o => o.orderId !== orderId);
                saveOrders();
                showToast(`🗑️ Order ${orderId} deleted permanently!`);
                renderOrders();
                updateStats();
            }
        }

        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!container) return;
            
            const filteredOrders = filterOrders();
            
            if (filteredOrders.length === 0) {
                container.innerHTML = '<tr><td colspan="8" style="text-align:center; padding:40px;">📭 No orders found for selected date range</td></tr>';
                return;
            }
            
            container.innerHTML = filteredOrders.map(order => {
                const statusBadgeClass = getStatusBadgeClass(order.status);
                const statusDisplay = order.status ? order.status.charAt(0).toUpperCase() + order.status.slice(1) : 'Confirmed';
                
                return `
                    <tr>
                        <td>${order.orderId || 'N/A'}</td>
                        <td>${order.date || 'N/A'}</td>
                        <td>${order.customer?.fullName || order.customer?.name || 'Guest'}</td>
                        <td>₹${(order.total || 0).toLocaleString('en-IN')}</td>
                        <td><span class="status-badge ${statusBadgeClass}">${statusDisplay}</span></td>
                        <td>
                            <select class="status-select" data-order-id="${order.orderId}" onchange="updateOrderStatus('${order.orderId}', this.value)">
                                <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                                <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                                <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                                <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                                <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                            </select>
                        </td>
                        <td>
                            <button class="view-details" onclick="viewOrderDetails('${order.orderId}')"><i class="fas fa-eye"></i> View</button>
                            <button class="delete-order-btn" onclick="deleteOrder('${order.orderId}')"><i class="fas fa-trash"></i> Delete</button>
                        </td>
                    </tr>
                `;
            }).join('');
            
            updateStats();
        }

        function updateOrderStatus(orderId, newStatus) {
            const orderIndex = orders.findIndex(o => o.orderId === orderId);
            if (orderIndex !== -1) {
                orders[orderIndex].status = newStatus;
                saveOrders();
                showToast(`✅ Order ${orderId} status updated to ${newStatus}`);
                renderOrders();
                updateStats();
            }
        }

        function viewOrderDetails(orderId) {
            const order = orders.find(o => o.orderId === orderId);
            if (!order) return;
            
            const itemsHtml = (order.items || []).map(item => {
                const product = products.find(p => p.id === item.id);
                const hasImage = product && product.images && product.images.length > 0;
                const imageUrl = hasImage ? product.images[0] : null;
                const itemIcon = product ? (product.icon || 'fa-gem') : (item.icon || 'fa-gem');
                const itemSize = item.size || 'Not Selected';
                
                return `
                    <div class="order-item-with-img">
                        <div class="order-product-img">
                            ${imageUrl ? 
                                `<img src="${imageUrl}" alt="${escapeHtml(item.name)}">` : 
                                `<i class="fas ${itemIcon}"></i>`
                            }
                        </div>
                        <div class="order-item-info">
                            <h4>${escapeHtml(item.name)}</h4>
                            <div class="order-item-size">
                                <i class="fas fa-tshirt"></i> Size: ${escapeHtml(itemSize)}
                            </div>
                            <p>Quantity: ${item.quantity} × ₹${(item.price || 0).toLocaleString('en-IN')}</p>
                        </div>
                        <div class="order-item-price">₹${((item.price || 0) * (item.quantity || 1)).toLocaleString('en-IN')}</div>
                    </div>
                `;
            }).join('');

            const statusBadgeClass = getStatusBadgeClass(order.status);
            const statusDisplay = order.status ? order.status.charAt(0).toUpperCase() + order.status.slice(1) : 'Confirmed';

            document.getElementById('orderDetailContent').innerHTML = `
                <div class="order-detail-row"><strong>📋 Order ID:</strong> ${order.orderId}</div>
                <div class="order-detail-row"><strong>📅 Date:</strong> ${order.date}</div>
                <div class="order-detail-row"><strong>📊 Status:</strong> <span class="status-badge ${statusBadgeClass}">${statusDisplay}</span></div>
                <div class="order-detail-row"><strong>💳 Payment:</strong> ${order.paymentMethod || 'Cash on Delivery'}</div>
                <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
                <strong>👤 Customer Details:</strong>
                <div class="order-detail-row"><strong>Name:</strong> ${order.customer?.fullName || order.customer?.name || 'Guest'}</div>
                <div class="order-detail-row"><strong>📞 Phone:</strong> ${order.customer?.phone || 'N/A'}</div>
                <div class="order-detail-row"><strong>✉️ Email:</strong> ${order.customer?.email || 'N/A'}</div>
                <div class="order-detail-row"><strong>📍 Address:</strong> ${order.customer?.address || 'N/A'}, ${order.customer?.city || ''}, ${order.customer?.state || ''} - ${order.customer?.pincode || ''}</div>
                <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
                <strong>🛍️ Order Items:</strong>
                ${itemsHtml || '<div class="order-detail-row">No items</div>'}
                <div style="margin-top: 15px; border-top: 1px solid rgba(212,175,55,0.3);"></div>
                <div class="order-detail-row"><strong>Subtotal:</strong> ₹${(order.subtotal || 0).toLocaleString('en-IN')}</div>
                <div class="order-detail-row"><strong>💰 Total Amount:</strong> <span style="color:#D4AF37; font-size:18px;">₹${(order.total || 0).toLocaleString('en-IN')}</span></div>
            `;
            document.getElementById('orderModal').classList.add('show');
        }

        function closeModal() {
            document.getElementById('orderModal').classList.remove('show');
        }

        function editProduct(id) {
            const product = products.find(p => p.id === id);
            if (!product) return;
            const newName = prompt('Edit product name:', product.name);
            if (newName && newName.trim()) product.name = newName.trim();
            const newPrice = prompt('Edit price (₹):', product.price);
            if (newPrice && !isNaN(newPrice)) product.price = parseInt(newPrice);
            saveProducts();
            renderProducts();
            showToast('✅ Product updated!');
        }

        function deleteProduct(id) {
            if (confirm('Are you sure you want to delete this product permanently?')) {
                products = products.filter(p => p.id !== id);
                saveProducts();
                renderProducts();
                showToast('✅ Product deleted permanently!');
            }
        }

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        function goToAddProduct() {
            window.location.href = 'add-product-.html';
        }

        // Date picker modal functions (unchanged UI, but fixed logic)
        let tempStartDate = '';
        let tempEndDate = '';

        function openDatePicker() {
            document.getElementById('datepickerModal').classList.add('show');
            tempStartDate = customStartDate;
            tempEndDate = customEndDate;
            updateDatePickerDisplay();
        }

        function closeDatePicker() {
            document.getElementById('datepickerModal').classList.remove('show');
        }

        function updateDatePickerDisplay() {
            const startDisplay = document.getElementById('startDateDisplay');
            const endDisplay = document.getElementById('endDateDisplay');
            if (startDisplay) {
                if (tempStartDate) startDisplay.innerHTML = `<span class="selected-date">${tempStartDate}</span>`;
                else startDisplay.innerHTML = `<span class="placeholder-text">dd/mm/yyyy</span>`;
            }
            if (endDisplay) {
                if (tempEndDate) endDisplay.innerHTML = `<span class="selected-date">${tempEndDate}</span>`;
                else endDisplay.innerHTML = `<span class="placeholder-text">dd/mm/yyyy (Optional)</span>`;
            }
        }

        function showNativeDatePicker(type) {
            const input = document.createElement('input');
            input.type = 'date';
            input.style.position = 'absolute';
            input.style.opacity = '0';
            document.body.appendChild(input);
            input.addEventListener('change', (e) => {
                const value = e.target.value;
                if (value) {
                    const parts = value.split('-');
                    const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                    if (type === 'start') tempStartDate = formattedDate;
                    else tempEndDate = formattedDate;
                    updateDatePickerDisplay();
                }
                document.body.removeChild(input);
            });
            input.showPicker();
        }

        function setStartDate() { showNativeDatePicker('start'); }
        function setEndDate() { showNativeDatePicker('end'); }

        function applyDateRange() {
            if (!tempStartDate) { showToast('❌ Please select start date'); return; }
            customStartDate = tempStartDate;
            customEndDate = tempEndDate || '';
            currentDateFilter = 'custom';
            const dateRangeText = document.getElementById('dateRangeText');
            if (dateRangeText) {
                if (customEndDate) dateRangeText.innerText = `${customStartDate} to ${customEndDate}`;
                else dateRangeText.innerText = `${customStartDate}`;
            }
            document.querySelectorAll('.date-filter-btn').forEach(btn => btn.classList.remove('active'));
            closeDatePicker();
            renderOrders();
            showToast(`📅 Showing orders from ${customStartDate}${customEndDate ? ' to ' + customEndDate : ''}`);
        }

        function clearDateRange() {
            customStartDate = ''; customEndDate = ''; tempStartDate = ''; tempEndDate = '';
            currentDateFilter = 'all';
            const dateRangeText = document.getElementById('dateRangeText');
            if (dateRangeText) dateRangeText.innerText = 'Select Date Range';
            document.querySelectorAll('.date-filter-btn').forEach(btn => {
                if (btn.getAttribute('data-filter') === 'all') btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderOrders();
            showToast('📅 Date filter cleared');
        }

        function applyDateFilter(filter) {
            currentDateFilter = filter;
            if (filter !== 'custom') { customStartDate = ''; customEndDate = ''; 
                const dateRangeText = document.getElementById('dateRangeText');
                if (dateRangeText) dateRangeText.innerText = 'Select Date Range';
            }
            document.querySelectorAll('.date-filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === filter) btn.classList.add('active');
            });
            renderOrders();
        }

        function applyStatusFilter(filter) {
            currentStatusFilter = filter;
            document.querySelectorAll('.status-filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-status') === filter) btn.classList.add('active');
            });
            renderOrders();
        }

        function renderDashboard() { /* similar to original but includes fixed functions */ 
            loadData();
            document.getElementById('app').innerHTML = `...`; // Keep full dashboard rendering
            // For brevity, actual full HTML string similar to original but with corrected onclick references. We'll use the existing working structure.
        }
        
        // Full renderDashboard and login logic integrated but ensuring all handlers point to fixed filters.
        // Since I'm providing final fix, I'll inject full working dashboard.
        (function init() {
            window.closeModal = closeModal;
            window.viewOrderDetails = viewOrderDetails;
            window.updateOrderStatus = updateOrderStatus;
            window.editProduct = editProduct;
            window.deleteProduct = deleteProduct;
            window.deleteOrder = deleteOrder;
            window.goToAddProduct = goToAddProduct;
            window.applyDateFilter = applyDateFilter;
            window.applyStatusFilter = applyStatusFilter;
            window.openDatePicker = openDatePicker;
            window.closeDatePicker = closeDatePicker;
            window.applyDateRange = applyDateRange;
            window.clearDateRange = clearDateRange;
            window.setStartDate = setStartDate;
            window.setEndDate = setEndDate;
            loadData();
            if (isLoggedIn) renderDashboard();
            else renderLoginPage();
        })();
        
        // Use the original dashboard HTML from first version but with all fixes already applied in the global scope.
        // To avoid code duplication, I attach full renderDashboard and renderLoginPage as before.
        function renderDashboard() {
            loadData();
            document.getElementById('app').innerHTML = `
                <div class="header"><div class="logo"><h1>VEDANTA ADMIN</h1></div><button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button></div>
                <div class="stats-grid"><div class="stat-card"><i class="fas fa-box"></i><div class="stat-number" id="totalProducts">0</div><div class="stat-label">Total Products</div></div><div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div><div class="stat-card"><i class="fas fa-rupee-sign"></i><div class="stat-number" id="totalRevenue">0</div><div class="stat-label">Total Revenue</div></div><div class="stat-card"><i class="fas fa-users"></i><div class="stat-number" id="totalCustomers">0</div><div class="stat-label">Customers</div></div></div>
                <div class="tabs"><button class="tab-btn active" data-tab="products">📦 Products</button><button class="tab-btn" data-tab="orders">📋 Orders</button></div>
                <div class="tab-content active" id="productsTab"><div class="add-product-header"><h3><i class="fas fa-boxes"></i> All Products</h3><button class="add-product-link" id="addProductBtn"><i class="fas fa-plus-circle"></i> Add New Product</button></div><div class="products-list" id="productsList"></div></div>
                <div class="tab-content" id="ordersTab"><div class="order-filters"><div class="filter-group"><span style="color:#888;">📅 Quick Date:</span><button class="filter-btn date-filter-btn active" data-filter="all" onclick="applyDateFilter('all')">All Orders</button><button class="filter-btn date-filter-btn" data-filter="today" onclick="applyDateFilter('today')">Today</button><button class="filter-btn date-filter-btn" data-filter="week" onclick="applyDateFilter('week')">This Week</button><button class="filter-btn date-filter-btn" data-filter="month" onclick="applyDateFilter('month')">This Month</button></div><div class="filter-group"><span style="color:#888;">📅 Custom Range:</span><div class="date-range-box" onclick="openDatePicker()"><i class="fas fa-calendar-alt"></i><span class="date-range-text" id="dateRangeText">Select Date Range</span><i class="fas fa-chevron-down"></i></div><button class="filter-btn" onclick="clearDateRange()" style="background:rgba(244,67,54,0.2); color:#F44336;"><i class="fas fa-times"></i> Clear</button></div><div class="filter-group"><span style="color:#888;">📊 Status:</span><button class="filter-btn status-filter-btn active" data-status="all" onclick="applyStatusFilter('all')">All</button><button class="filter-btn status-filter-btn" data-status="confirmed" onclick="applyStatusFilter('confirmed')">Confirmed</button><button class="filter-btn status-filter-btn" data-status="processing" onclick="applyStatusFilter('processing')">Processing</button><button class="filter-btn status-filter-btn" data-status="shipped" onclick="applyStatusFilter('shipped')">Shipped</button><button class="filter-btn status-filter-btn" data-status="delivered" onclick="applyStatusFilter('delivered')">Delivered</button><button class="filter-btn status-filter-btn" data-status="cancelled" onclick="applyStatusFilter('cancelled')">Cancelled</button></div></div><div class="orders-table"><table><thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Amount</th><th>Status</th><th>Update Status</th><th>Actions</th></tr></thead><tbody id="ordersList"></tbody></table></div></div>
                <div class="modal" id="orderModal"><div class="modal-content"><div class="modal-header"><h3><i class="fas fa-receipt"></i> Order Details</h3><button class="close-modal" onclick="closeModal()">&times;</button></div><div id="orderDetailContent"></div></div></div>
            `;
            const datepickerModal = document.createElement('div'); datepickerModal.id = 'datepickerModal'; datepickerModal.className = 'datepicker-modal'; datepickerModal.innerHTML = `<div class="datepicker-content"><h3><i class="fas fa-calendar-alt"></i> Select Date Range</h3><div class="datepicker-input-group"><label>Start Date</label><div class="clickable-date-input" onclick="setStartDate()"><span id="startDateDisplay"><span class="placeholder-text">dd/mm/yyyy</span></span><i class="fas fa-calendar"></i></div></div><div class="datepicker-input-group"><label>End Date (Optional)</label><div class="clickable-date-input" onclick="setEndDate()"><span id="endDateDisplay"><span class="placeholder-text">dd/mm/yyyy (Optional)</span></span><i class="fas fa-calendar"></i></div></div><div class="datepicker-buttons"><button class="datepicker-cancel" onclick="closeDatePicker()">Cancel</button><button class="datepicker-apply" onclick="applyDateRange()">Apply</button></div></div>`;
            document.body.appendChild(datepickerModal);
            document.querySelectorAll('.tab-btn').forEach(btn => btn.addEventListener('click', () => { document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active')); btn.classList.add('active'); document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active')); document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active'); if (btn.dataset.tab === 'products') renderProducts(); if (btn.dataset.tab === 'orders') renderOrders(); }));
            document.getElementById('addProductBtn')?.addEventListener('click', goToAddProduct);
            document.getElementById('logoutBtn')?.addEventListener('click', () => { localStorage.removeItem('adminLoggedIn'); isLoggedIn = false; renderLoginPage(); });
            renderProducts(); renderOrders(); updateStats();
        }
        function renderLoginPage() {
            document.getElementById('app').innerHTML = `<div class="login-container"><div class="login-card"><h2>VEDANTA ADMIN</h2><p>Enter credentials</p><div class="input-group"><label>Username</label><input type="text" id="adminUsername"></div><div class="input-group"><label>Password</label><input type="password" id="adminPassword"></div><button class="login-btn" id="loginBtn">Login</button><div class="error-msg" id="errorMsg">❌ Invalid</div></div></div>`;
            document.getElementById('loginBtn').addEventListener('click', () => { const u = document.getElementById('adminUsername').value.trim(), p = document.getElementById('adminPassword').value.trim(); if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) { localStorage.setItem('adminLoggedIn','true'); showToast('✅ Login success!'); isLoggedIn = true; renderDashboard(); } else { document.getElementById('errorMsg').classList.add('show'); setTimeout(()=>document.getElementById('errorMsg').classList.remove('show'),2000); } });
        }
    </script>
</body>
</html>
