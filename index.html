        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const maxDim = 800;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = (h * maxDim) / w; w = maxDim; }
                            else { w = (w * maxDim) / h; h = maxDim; }
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo"><h1>VEDANTA ADMIN <span class="sync-badge"><i class="fas fa-cloud-upload-alt"></i> Cloud Sync</span></h1></div>
                    <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-box"></i><div class="stat-number" id="totalProducts">0</div><div class="stat-label">Total Products</div></div>
                    <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
                    <div class="stat-card"><i class="fas fa-rupee-sign"></i><div class="stat-number" id="totalRevenue">0</div><div class="stat-label">Total Revenue</div></div>
                    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number" id="totalCustomers">0</div><div class="stat-label">Customers</div></div>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="products">📦 Products</button>
                    <button class="tab-btn" data-tab="orders">📋 Orders</button>
                </div>
                <div class="tab-content active" id="productsTab">
                    <div class="add-product-header">
                        <h3><i class="fas fa-boxes"></i> All Products</h3>
                        <button class="add-product-link" id="addProductBtn"><i class="fas fa-plus-circle"></i> Add New Product</button>
                    </div>
                    <div class="products-list" id="productsList"></div>
                </div>
                <div class="tab-content" id="ordersTab">
                    <div class="orders-table">
                        <table style="width:100%">
                            <thead>
                                <tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Amount</th><th>Status</th><th>Update</th><th>Actions</th></tr>
                            </thead>
                            <tbody id="ordersList"></tbody>
                         </table>
                    </div>
                </div>
                <div id="editModal" class="edit-modal"></div>
            `;
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                    document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
                });
            });
            
            document.getElementById('addProductBtn')?.addEventListener('click', goToAddProduct);
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                localStorage.removeItem('adminLoggedIn');
                isLoggedIn = false;
                renderLoginPage();
            });
            
            loadData();
        }
        
        function renderLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="login-container">
                    <div class="login-card">
                        <h2>VEDANTA ADMIN</h2>
                        <p>Enter credentials</p>
                        <div class="input-group">
                            <label>Username</label>
                            <input type="text" id="adminUsername">
                        </div>
                        <div class="input-group">
                            <label>Password</label>
                            <input type="password" id="adminPassword">
                        </div>
                        <button class="login-btn" id="loginBtn">Login</button>
                        <div class="error-msg" id="errorMsg" style="color:#F44336; text-align:center; margin-top:15px; display:none;">❌ Invalid credentials</div>
                    </div>
                </div>
            `;
            document.getElementById('loginBtn').addEventListener('click', () => {
                const u = document.getElementById('adminUsername').value.trim();
                const p = document.getElementById('adminPassword').value.trim();
                if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
                    localStorage.setItem('adminLoggedIn', 'true');
                    showToast('✅ Login success! Cloud sync enabled');
                    isLoggedIn = true;
                    renderDashboard();
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 2000);
                }
            });
        }
        
        // Make all functions global for onclick
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.saveProductEdit = saveProductEdit;
        window.deleteProduct = deleteProduct;
        window.updateOrderStatus = updateOrderStatus;
        window.deleteOrder = deleteOrder;
        window.viewOrderDetails = viewOrderDetails;
        window.goToAddProduct = goToAddProduct;
        window.addSize = addSize;
        window.removeSize = removeSize;
        window.addColor = addColor;
        window.removeColor = removeColor;
        window.addCombo = addCombo;
        window.removeCombo = removeCombo;
        window.addImages = addImages;
        window.removeImage = removeImage;
        window.addColorFromMain = addColorFromMain;
        window.addColorFromFullGrid = addColorFromFullGrid;
        window.toggleFullColorGrid = toggleFullColorGrid;
        
        if (isLoggedIn) renderDashboard();
        else renderLoginPage();
        
        // Real-time listeners
        if (typeof db !== 'undefined') {
            db.collection('products').onSnapshot(() => { if (isLoggedIn) loadData(); });
            db.collection('orders').onSnapshot(() => { if (isLoggedIn) loadData(); });
        }
    </script>
</body>
</html>
