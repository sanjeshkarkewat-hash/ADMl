        function compressImage(file) {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let w = img.width, h = img.height;
                        const maxDim = 800;
                        if (w > maxDim || h > maxDim) {
                            if (w > h) { h = (h * maxDim) / w; w = maxDim; }
                            else { w = (w * maxDim) / h; h = maxDim; }
                        }
                        canvas.width = w; canvas.height = h;
                        canvas.getContext('2d').drawImage(img, 0, 0, w, h);
                        resolve(canvas.toDataURL('image/jpeg', 0.7));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        function parseOrderDate(orderDateStr) {
            if (!orderDateStr) return null;
            try { return new Date(orderDateStr); } catch(e) { return null; }
        }
        
        function isToday(orderDate) {
            if (!orderDate) return false;
            const today = new Date();
            return orderDate.toDateString() === today.toDateString();
        }
        
        function isThisWeek(orderDate) {
            if (!orderDate) return false;
            const today = new Date();
            const startOfWeek = new Date(today);
            startOfWeek.setDate(today.getDate() - today.getDay());
            startOfWeek.setHours(0,0,0,0);
            const endOfWeek = new Date(startOfWeek);
            endOfWeek.setDate(startOfWeek.getDate() + 6);
            endOfWeek.setHours(23,59,59,999);
            return orderDate >= startOfWeek && orderDate <= endOfWeek;
        }
        
        function isThisMonth(orderDate) {
            if (!orderDate) return false;
            const today = new Date();
            return orderDate.getMonth() === today.getMonth() && orderDate.getFullYear() === today.getFullYear();
        }
        
        function isWithinCustomRange(orderDate) {
            if (!customStartDate || !orderDate) return true;
            const startParts = customStartDate.split('/');
            const startDate = new Date(parseInt(startParts[2]), parseInt(startParts[1]) - 1, parseInt(startParts[0]));
            startDate.setHours(0,0,0,0);
            if (customEndDate) {
                const endParts = customEndDate.split('/');
                const endDate = new Date(parseInt(endParts[2]), parseInt(endParts[1]) - 1, parseInt(endParts[0]));
                endDate.setHours(23,59,59,999);
                return orderDate >= startDate && orderDate <= endDate;
            }
            return orderDate.toDateString() === startDate.toDateString();
        }
        
        function filterOrders() {
            let filtered = [...orders];
            if (currentStatusFilter !== 'all') {
                filtered = filtered.filter(o => o.status === currentStatusFilter);
            }
            filtered = filtered.filter(o => {
                const orderDate = parseOrderDate(o.orderDate);
                if (!orderDate) return currentDateFilter === 'all';
                if (currentDateFilter === 'today') return isToday(orderDate);
                if (currentDateFilter === 'week') return isThisWeek(orderDate);
                if (currentDateFilter === 'month') return isThisMonth(orderDate);
                if (currentDateFilter === 'custom') return isWithinCustomRange(orderDate);
                return true;
            });
            filtered.sort((a, b) => new Date(b.orderDate) - new Date(a.orderDate));
            return filtered;
        }
        
        function renderOrders() {
            const container = document.getElementById('ordersList');
            if (!container) return;
            const filteredOrders = filterOrders();
            if (filteredOrders.length === 0) {
                container.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:40px;">📭 No orders found</td></tr>';
                return;
            }
            container.innerHTML = filteredOrders.map(order => {
                const statusBadgeClass = (() => {
                    switch(order.status) {
                        case 'confirmed': return 'status-confirmed';
                        case 'processing': return 'status-processing';
                        case 'shipped': return 'status-shipped';
                        case 'delivered': return 'status-delivered';
                        case 'cancelled': return 'status-cancelled';
                        default: return 'status-confirmed';
                    }
                })();
                return `
                    <tr>
                        <td>${order.orderId || order.id}</td>
                        <td>${new Date(order.orderDate).toLocaleDateString('en-IN')}</td>
                        <td>${order.customerName || 'Guest'}</td>
                        <td>₹${(order.total || 0).toLocaleString('en-IN')}</td>
                        <td><span class="status-badge ${statusBadgeClass}">${order.status || 'Confirmed'}</span></td>
                        <td><select class="status-select" onchange="updateOrderStatus('${order.id}', this.value)">
                            <option value="confirmed" ${order.status === 'confirmed' ? 'selected' : ''}>Confirmed</option>
                            <option value="processing" ${order.status === 'processing' ? 'selected' : ''}>Processing</option>
                            <option value="shipped" ${order.status === 'shipped' ? 'selected' : ''}>Shipped</option>
                            <option value="delivered" ${order.status === 'delivered' ? 'selected' : ''}>Delivered</option>
                            <option value="cancelled" ${order.status === 'cancelled' ? 'selected' : ''}>Cancelled</option>
                        </select></td>
                        <td><button class="view-details" onclick="viewOrderDetails('${order.id}')"><i class="fas fa-eye"></i> View</button>
                        <button class="delete-order-btn" onclick="deleteOrder('${order.id}')"><i class="fas fa-trash"></i> Delete</button></td>
                    </tr>
                `;
            }).join('');
            updateStats();
        }
        
        function viewOrderDetails(orderId) {
            const order = orders.find(o => o.id == orderId);
            if (!order) return;
            
            const itemsHtml = (order.items || []).map(item => {
                const product = products.find(p => p.id == item.id);
                const hasImage = product && product.images && product.images.length > 0;
                const imageUrl = hasImage ? product.images[0] : null;
                const itemIcon = product ? (product.icon || 'fa-gem') : 'fa-gem';
                const itemSize = item.size || item.selectedSize || '';
                const itemColor = item.color || item.selectedColor || '';
                const colorCode = getColorCode(itemColor);
                
                let comboDisplay = '';
                if (item.combo) {
                    comboDisplay = `<div class="combo-badge-detail"><i class="fas fa-gift"></i> ${escapeHtml(item.combo)}</div>`;
                } else if (item.isCombo && item.comboMultiplier) {
                    comboDisplay = `<div class="combo-badge-detail"><i class="fas fa-gift"></i> Combo: ${item.comboMultiplier} items per pack</div>`;
                } else if (item.comboInfo) {
                    comboDisplay = `<div class="combo-badge-detail"><i class="fas fa-gift"></i> ${escapeHtml(item.comboInfo)}</div>`;
                }
                
                return `
                    <div class="order-item-with-img">
                        <div class="order-product-img">
                            ${imageUrl ? `<img src="${imageUrl}" alt="${escapeHtml(item.name)}">` : `<i class="fas ${itemIcon}"></i>`}
                        </div>
                        <div class="order-item-info">
                            <h4>${escapeHtml(item.name)}</h4>
                            ${itemSize ? `<div class="order-item-size"><i class="fas fa-tshirt"></i> Size: ${escapeHtml(itemSize)}</div>` : ''}
                            ${itemColor ? `<div class="order-item-color"><span class="color-swatch-small" style="background: ${colorCode}; border:1px solid rgba(255,255,255,0.3);"></span> Color: ${escapeHtml(itemColor)}</div>` : ''}
                            ${comboDisplay}
                            <p>Quantity: ${item.quantity} × ₹${(item.price || 0).toLocaleString('en-IN')}</p>
                        </div>
                        <div class="order-item-price">₹${((item.price || 0) * (item.quantity || 1)).toLocaleString('en-IN')}</div>
                    </div>
                `;
            }).join('');
            
            const statusBadgeClass = (() => {
                switch(order.status) {
                    case 'confirmed': return 'status-confirmed';
                    case 'processing': return 'status-processing';
                    case 'shipped': return 'status-shipped';
                    case 'delivered': return 'status-delivered';
                    case 'cancelled': return 'status-cancelled';
                    default: return 'status-confirmed';
                }
            })();
            
            document.getElementById('orderDetailContent').innerHTML = `
                <div class="order-detail-row"><strong>📋 Order ID:</strong> ${order.orderId || order.id}</div>
                <div class="order-detail-row"><strong>📅 Date:</strong> ${new Date(order.orderDate).toLocaleString()}</div>
                <div class="order-detail-row"><strong>📊 Status:</strong> <span class="status-badge ${statusBadgeClass}">${order.status || 'Confirmed'}</span></div>
                <div class="order-detail-row"><strong>💳 Payment:</strong> ${order.paymentMethod || 'Cash on Delivery'}</div>
                <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
                <strong>👤 Customer Details:</strong>
                <div class="order-detail-row"><strong>Name:</strong> ${order.customerName || 'Guest'}</div>
                <div class="order-detail-row"><strong>📞 Phone:</strong> ${order.customerPhone || 'N/A'}</div>
                <div class="order-detail-row"><strong>✉️ Email:</strong> ${order.customerEmail || 'N/A'}</div>
                <div class="order-detail-row"><strong>📍 Address:</strong> ${order.shippingAddress?.address || 'N/A'}, ${order.shippingAddress?.city || ''}, ${order.shippingAddress?.state || ''} - ${order.shippingAddress?.pincode || ''}</div>
                <div style="margin: 15px 0; border-top: 1px solid rgba(255,255,255,0.1);"></div>
                <strong>🛍️ Order Items:</strong>
                ${itemsHtml || '<div class="order-detail-row">No items found</div>'}
                <div style="margin-top: 15px; border-top: 1px solid rgba(212,175,55,0.3);"></div>
                <div class="order-detail-row"><strong>💰 Total Amount:</strong> <span style="color:#D4AF37; font-size:18px;">₹${(order.total || 0).toLocaleString('en-IN')}</span></div>
            `;
            document.getElementById('orderModal').classList.add('show');
        }
        
        function closeOrderModal() { document.getElementById('orderModal').classList.remove('show'); }
        
        async function updateOrderStatus(orderId, newStatus) {
            const result = await updateOrderStatusInFirebase(orderId, newStatus);
            if (result.success) {
                showToast(`✅ Order status updated to ${newStatus}`);
                await loadData();
            } else { showToast('❌ Update failed', true); }
        }
        
        async function deleteOrder(orderId) {
            if (confirm('⚠️ Delete this order permanently?')) {
                const result = await deleteOrderFromFirebase(orderId);
                if (result.success) { showToast('✅ Order deleted'); await loadData(); }
                else { showToast('❌ Delete failed', true); }
            }
        }
        
        function openDatePicker() { document.getElementById('datepickerModal').classList.add('show'); }
        function closeDatePicker() { document.getElementById('datepickerModal').classList.remove('show'); }
        
        function updateDatePickerDisplay() {
            const startDisplay = document.getElementById('startDateDisplay');
            const endDisplay = document.getElementById('endDateDisplay');
            if (startDisplay) {
                if (tempStartDate) startDisplay.innerHTML = `<span class="selected-date">${tempStartDate}</span>`;
                else startDisplay.innerHTML = `<span class="placeholder-text">dd/mm/yyyy</span>`;
            }
            if (endDisplay) {
                if (tempEndDate) endDisplay.innerHTML = `<span class="selected-date">${tempEndDate}</span>`;
                else endDisplay.innerHTML = `<span class="placeholder-text">dd/mm/yyyy (Optional)</span>`;
            }
        }
        
        function showNativeDatePicker(type) {
            const input = document.createElement('input');
            input.type = 'date';
            input.style.position = 'absolute';
            input.style.opacity = '0';
            document.body.appendChild(input);
            input.addEventListener('change', (e) => {
                const value = e.target.value;
                if (value) {
                    const parts = value.split('-');
                    const formattedDate = `${parts[2]}/${parts[1]}/${parts[0]}`;
                    if (type === 'start') tempStartDate = formattedDate;
                    else tempEndDate = formattedDate;
                    updateDatePickerDisplay();
                }
                document.body.removeChild(input);
            });
            input.showPicker();
        }
        
        function setStartDate() { showNativeDatePicker('start'); }
        function setEndDate() { showNativeDatePicker('end'); }
        
        function applyDateRange() {
            if (!tempStartDate) { showToast('❌ Please select start date', true); return; }
            customStartDate = tempStartDate;
            customEndDate = tempEndDate || '';
            currentDateFilter = 'custom';
            const dateRangeText = document.getElementById('dateRangeText');
            if (dateRangeText) {
                if (customEndDate) dateRangeText.innerText = `${customStartDate} to ${customEndDate}`;
                else dateRangeText.innerText = `${customStartDate}`;
            }
            document.querySelectorAll('.date-filter-btn').forEach(btn => btn.classList.remove('active'));
            closeDatePicker();
            renderOrders();
            showToast(`📅 Showing orders from ${customStartDate}${customEndDate ? ' to ' + customEndDate : ''}`);
        }
        
        function clearDateRange() {
            customStartDate = ''; customEndDate = ''; tempStartDate = ''; tempEndDate = '';
            currentDateFilter = 'all';
            const dateRangeText = document.getElementById('dateRangeText');
            if (dateRangeText) dateRangeText.innerText = 'Select Date Range';
            document.querySelectorAll('.date-filter-btn').forEach(btn => {
                if (btn.getAttribute('data-filter') === 'all') btn.classList.add('active');
                else btn.classList.remove('active');
            });
            renderOrders();
            showToast('📅 Date filter cleared');
        }
        
        function applyDateFilter(filter) {
            currentDateFilter = filter;
            if (filter !== 'custom') { customStartDate = ''; customEndDate = ''; 
                const dateRangeText = document.getElementById('dateRangeText');
                if (dateRangeText) dateRangeText.innerText = 'Select Date Range';
            }
            document.querySelectorAll('.date-filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-filter') === filter) btn.classList.add('active');
            });
            renderOrders();
        }
        
        function applyStatusFilter(filter) {
            currentStatusFilter = filter;
            document.querySelectorAll('.status-filter-btn').forEach(btn => {
                btn.classList.remove('active');
                if (btn.getAttribute('data-status') === filter) btn.classList.add('active');
            });
            renderOrders();
        }
        
        function goToAddProduct() { window.location.href = 'admin-add-product.html'; }
        
        // ✅ Return Management - Open return.html page
        function openReturnManagement() {
            window.location.href = 'return.html';
        }
        
        function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m] || m)); }
        
        function renderDashboard() {
            document.getElementById('app').innerHTML = `
                <div class="header">
                    <div class="logo"><h1>VEDANTA ADMIN <span class="sync-badge"><i class="fas fa-cloud-upload-alt"></i> Cloud Sync</span></h1></div>
                    <div class="header-buttons">
                        <button class="return-manage-btn" id="returnManageBtn"><i class="fas fa-undo-alt"></i> Return Requests</button>
                        <button class="logout-btn" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> Logout</button>
                    </div>
                </div>
                <div class="stats-grid">
                    <div class="stat-card"><i class="fas fa-box"></i><div class="stat-number" id="totalProducts">0</div><div class="stat-label">Total Products</div></div>
                    <div class="stat-card"><i class="fas fa-shopping-cart"></i><div class="stat-number" id="totalOrders">0</div><div class="stat-label">Total Orders</div></div>
                    <div class="stat-card"><i class="fas fa-rupee-sign"></i><div class="stat-number" id="totalRevenue">0</div><div class="stat-label">Total Revenue</div></div>
                    <div class="stat-card"><i class="fas fa-users"></i><div class="stat-number" id="totalCustomers">0</div><div class="stat-label">Customers</div></div>
                </div>
                <div class="tabs">
                    <button class="tab-btn active" data-tab="products">📦 Products</button>
                    <button class="tab-btn" data-tab="orders">📋 Orders</button>
                </div>
                <div class="tab-content active" id="productsTab">
                    <div class="add-product-header"><h3><i class="fas fa-boxes"></i> All Products</h3><button class="add-product-link" id="addProductBtn"><i class="fas fa-plus-circle"></i> Add New Product</button></div>
                    <div class="products-list" id="productsList"></div>
                </div>
                <div class="tab-content" id="ordersTab">
                    <div class="order-filters">
                        <div class="filter-group">
                            <span style="color:#888;">📅 Quick Date:</span>
                            <button class="filter-btn date-filter-btn active" data-filter="all" onclick="applyDateFilter('all')">All Orders</button>
                            <button class="filter-btn date-filter-btn" data-filter="today" onclick="applyDateFilter('today')">Today</button>
                            <button class="filter-btn date-filter-btn" data-filter="week" onclick="applyDateFilter('week')">This Week</button>
                            <button class="filter-btn date-filter-btn" data-filter="month" onclick="applyDateFilter('month')">This Month</button>
                        </div>
                        <div class="filter-group">
                            <span style="color:#888;">📅 Custom Range:</span>
                            <div class="date-range-box" onclick="openDatePicker()"><i class="fas fa-calendar-alt"></i><span class="date-range-text" id="dateRangeText">Select Date Range</span><i class="fas fa-chevron-down"></i></div>
                            <button class="filter-btn" onclick="clearDateRange()" style="background:rgba(244,67,54,0.2); color:#F44336;"><i class="fas fa-times"></i> Clear</button>
                        </div>
                        <div class="filter-group">
                            <span style="color:#888;">📊 Status:</span>
                            <button class="filter-btn status-filter-btn active" data-status="all" onclick="applyStatusFilter('all')">All</button>
                            <button class="filter-btn status-filter-btn" data-status="confirmed" onclick="applyStatusFilter('confirmed')">Confirmed</button>
                            <button class="filter-btn status-filter-btn" data-status="processing" onclick="applyStatusFilter('processing')">Processing</button>
                            <button class="filter-btn status-filter-btn" data-status="shipped" onclick="applyStatusFilter('shipped')">Shipped</button>
                            <button class="filter-btn status-filter-btn" data-status="delivered" onclick="applyStatusFilter('delivered')">Delivered</button>
                            <button class="filter-btn status-filter-btn" data-status="cancelled" onclick="applyStatusFilter('cancelled')">Cancelled</button>
                        </div>
                    </div>
                    <div class="orders-table"><table><thead><tr><th>Order ID</th><th>Date</th><th>Customer</th><th>Amount</th><th>Status</th><th>Update</th><th>Actions</th></tr></thead><tbody id="ordersList"></tbody>}</div>
                </div>
                <div id="editModal" class="edit-modal"></div>
                <div id="orderModal" class="order-modal"><div class="order-modal-content"><div class="order-modal-header"><h3><i class="fas fa-receipt"></i> Order Details</h3><button class="close-order-modal" onclick="closeOrderModal()">&times;</button></div><div id="orderDetailContent"></div></div></div>
            `;
            
            const datepickerModal = document.createElement('div'); 
            datepickerModal.id = 'datepickerModal'; 
            datepickerModal.className = 'datepicker-modal'; 
            datepickerModal.innerHTML = `
                <div class="datepicker-content">
                    <h3><i class="fas fa-calendar-alt"></i> Select Date Range</h3>
                    <div class="datepicker-input-group"><label>Start Date</label><div class="clickable-date-input" onclick="setStartDate()"><span id="startDateDisplay"><span class="placeholder-text">dd/mm/yyyy</span></span><i class="fas fa-calendar"></i></div></div>
                    <div class="datepicker-input-group"><label>End Date (Optional)</label><div class="clickable-date-input" onclick="setEndDate()"><span id="endDateDisplay"><span class="placeholder-text">dd/mm/yyyy (Optional)</span></span><i class="fas fa-calendar"></i></div></div>
                    <div class="datepicker-buttons"><button class="datepicker-cancel" onclick="closeDatePicker()">Cancel</button><button class="datepicker-apply" onclick="applyDateRange()">Apply</button></div>
                </div>
            `;
            document.body.appendChild(datepickerModal);
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
                    document.getElementById(`${btn.dataset.tab}Tab`).classList.add('active');
                    if (btn.dataset.tab === 'orders') renderOrders();
                });
            });
            
            document.getElementById('addProductBtn')?.addEventListener('click', goToAddProduct);
            document.getElementById('logoutBtn')?.addEventListener('click', () => {
                localStorage.removeItem('adminLoggedIn');
                isLoggedIn = false;
                renderLoginPage();
            });
            document.getElementById('returnManageBtn')?.addEventListener('click', openReturnManagement);
            
            loadFromCache();
            loadData();
        }
        
        function renderLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="login-container"><div class="login-card"><h2>VEDANTA ADMIN</h2><p>Enter credentials</p>
                <div class="input-group"><label>Username</label><input type="text" id="adminUsername"></div>
                <div class="input-group"><label>Password</label><input type="password" id="adminPassword"></div>
                <button class="login-btn" id="loginBtn">Login</button>
                <div class="error-msg" id="errorMsg" style="color:#F44336; text-align:center; margin-top:15px; display:none;">❌ Invalid credentials</div></div></div>
            `;
            document.getElementById('loginBtn').addEventListener('click', () => {
                const u = document.getElementById('adminUsername').value.trim();
                const p = document.getElementById('adminPassword').value.trim();
                if (u === ADMIN_USERNAME && p === ADMIN_PASSWORD) {
                    localStorage.setItem('adminLoggedIn', 'true');
                    showToast('✅ Login success!');
                    isLoggedIn = true;
                    renderDashboard();
                } else {
                    document.getElementById('errorMsg').style.display = 'block';
                    setTimeout(() => document.getElementById('errorMsg').style.display = 'none', 2000);
                }
            });
        }
        
        // Make functions global
        window.openEditModal = openEditModal;
        window.closeEditModal = closeEditModal;
        window.saveProductEdit = saveProductEdit;
        window.deleteProduct = deleteProduct;
        window.updateOrderStatus = updateOrderStatus;
        window.deleteOrder = deleteOrder;
        window.viewOrderDetails = viewOrderDetails;
        window.closeOrderModal = closeOrderModal;
        window.goToAddProduct = goToAddProduct;
        window.addSize = addSize;
        window.removeSize = removeSize;
        window.addColor = addColor;
        window.removeColor = removeColor;
        window.addCombo = addCombo;
        window.removeCombo = removeCombo;
        window.addImages = addImages;
        window.removeImage = removeImage;
        window.addColorFromMain = addColorFromMain;
        window.addColorFromFullGrid = addColorFromFullGrid;
        window.toggleFullColorGrid = toggleFullColorGrid;
        window.applyDateFilter = applyDateFilter;
        window.applyStatusFilter = applyStatusFilter;
        window.openDatePicker = openDatePicker;
        window.closeDatePicker = closeDatePicker;
        window.applyDateRange = applyDateRange;
        window.clearDateRange = clearDateRange;
        window.setStartDate = setStartDate;
        window.setEndDate = setEndDate;
        
        if (isLoggedIn) renderDashboard();
        else renderLoginPage();
        
        if (typeof db !== 'undefined') {
            db.collection('products').onSnapshot(() => { if (isLoggedIn) loadData(); });
            db.collection('orders').onSnapshot(() => { if (isLoggedIn) loadData(); });
        }
    </script>
</body>
</html>
